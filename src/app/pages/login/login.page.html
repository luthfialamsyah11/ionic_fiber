<ion-content class="login-content" [scrollY]="false">
  <div class="login-container">

    <!-- Brand Header -->
    <div class="login-header">
      <div class="logo-wrap">
        <div class="logo-icon">
          <ion-icon name="flash"></ion-icon>
        </div>
        <div class="logo-glow"></div>
      </div>
      <h1>FiberOps</h1>
      <p class="subtitle">Field Service Technician</p>
    </div>

    <!-- Login Card -->
    <div class="login-card">
      <h2>Masuk ke Akun</h2>
      <p class="card-desc">Masukkan kredensial Anda untuk melanjutkan</p>

      <div class="form-group">
        <label>Email</label>
        <div class="input-wrap" [class.focused]="emailFocused">
          <ion-icon name="mail-outline" class="input-icon"></ion-icon>
          <input
            type="email"
            [(ngModel)]="email"
            placeholder="nama@perusahaan.com"
            autocomplete="email"
            (focus)="emailFocused = true"
            (blur)="emailFocused = false"
          />
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap" [class.focused]="passwordFocused">
          <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
          <input
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            placeholder="Masukkan password"
            (focus)="passwordFocused = true"
            (blur)="passwordFocused = false"
          />
          <button class="toggle-btn" (click)="togglePassword()" type="button">
            <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </button>
        </div>
      </div>

      <button class="btn-login" (click)="login()">
        <span>Masuk</span>
        <ion-icon name="arrow-forward-outline"></ion-icon>
      </button>
    </div>

    <!-- Footer -->
    <div class="login-footer">
      <p>FiberOps Technician v1.0</p>
      <p class="copyright">&copy; 2024 FiberOps. All rights reserved.</p>
    </div>
  </div>
</ion-content>
